name: Discover New Tools
on:
  schedule:
    - cron: '0 9 * * 5'  # Weekly on Friday
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Search GitHub for new repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOPICS=("terraform-compliance" "policy-as-code" "iac-security" "terraform-security" "compliance-as-code" "terraform-testing" "iac-compliance" "cis-benchmark" "terraform-sentinel")
          KEYWORDS=("terraform+compliance" "terraform+sentinel+policy" "rego+terraform" "terraform+cis+benchmark" "terraform+fedramp" "terraform+drift+detection")
          SINCE=$(date -d '7 days ago' +%Y-%m-%d)

          echo "# New Repos Discovered (week of $(date +%Y-%m-%d))" > /tmp/discoveries.md
          echo "" >> /tmp/discoveries.md
          echo "## By Topic" >> /tmp/discoveries.md
          echo "" >> /tmp/discoveries.md

          for topic in "${TOPICS[@]}"; do
            echo "### Topic: $topic" >> /tmp/discoveries.md
            curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/search/repositories?q=topic:${topic}+created:>${SINCE}+stars:>3&sort=stars&order=desc&per_page=10" \
              | jq -r '.items[] | "- [\(.full_name)](\(.html_url)) - \(.description // "No description") (⭐ \(.stargazers_count))"' \
              >> /tmp/discoveries.md
            echo "" >> /tmp/discoveries.md
          done

          echo "## By Keyword" >> /tmp/discoveries.md
          echo "" >> /tmp/discoveries.md

          for kw in "${KEYWORDS[@]}"; do
            echo "### Keyword: $kw" >> /tmp/discoveries.md
            curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/search/repositories?q=${kw}+created:>${SINCE}+stars:>5&sort=stars&order=desc&per_page=10" \
              | jq -r '.items[] | "- [\(.full_name)](\(.html_url)) - \(.description // "No description") (⭐ \(.stargazers_count))"' \
              >> /tmp/discoveries.md
            echo "" >> /tmp/discoveries.md
          done

      - name: Create issue if discoveries found
        if: success()
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Weekly Discovery: New repos ($(date +%Y-%m-%d))"
          content-filepath: /tmp/discoveries.md
          labels: discovery, triage
